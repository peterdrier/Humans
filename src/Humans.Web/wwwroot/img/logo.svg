<svg xmlns="http://www.w3.org/2000/svg" viewBox="15 11 210 210" role="img" aria-label="Vitruvian Man">
  <!-- ===== CONSTRUCTION (faint gold) ===== -->
  <!-- tier A: axes, diagonals, proportion circle, compass arc (>~80px) -->
  <g fill="none" stroke="#c9a96e" stroke-width="1.4" opacity="0.16" stroke-linecap="round">
    <line x1="120" y1="20" x2="120" y2="212"/>
    <line x1="24" y1="116" x2="216" y2="116"/>
    <circle cx="120" cy="116" r="74" stroke-dasharray="2.5 3"/>
    <line x1="120" y1="22" x2="40" y2="116"/>
    <line x1="120" y1="22" x2="200" y2="116"/>
    <line x1="40" y1="116" x2="120" y2="210"/>
    <line x1="200" y1="116" x2="120" y2="210"/>
    <path d="M64,116 A56,56 0 0 1 176,116"/>
  </g>
  <!-- tier B: measurement ticks + corner flourishes (>~120px) -->
  <g fill="none" stroke="#c9a96e" stroke-width="1" opacity="0.12" stroke-linecap="round">
    <g id="ticksLR">
      <line x1="29" y1="36" x2="35" y2="36"/><line x1="29" y1="80" x2="35" y2="80"/>
      <line x1="29" y1="116" x2="35" y2="116"/><line x1="29" y1="152" x2="35" y2="152"/>
      <line x1="29" y1="188" x2="35" y2="188"/><line x1="29" y1="212" x2="35" y2="212"/>
    </g>
    <use href="#ticksLR" transform="translate(240,0) scale(-1,1)"/>
    <g id="corner"><path d="M22,32 L22,20 L34,20"/><circle cx="22" cy="20" r="1.3"/></g>
    <use href="#corner" transform="translate(240,0) scale(-1,1)"/>
    <use href="#corner" transform="translate(0,232) scale(1,-1)"/>
    <use href="#corner" transform="translate(240,232) scale(-1,-1)"/>
  </g>
  <!-- ===== FRAME ===== -->
  <g fill="none" stroke="#c9a96e" stroke-width="4.5" stroke-linecap="round">
    <circle cx="120" cy="116" r="100"/>
    <rect x="32" y="36" width="176" height="176"/>
  </g>
  <!-- ===== LIMBS (bold capsules) ===== -->
  <g fill="none" stroke="#c9a96e" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <g id="vmlimb">
      <line x1="138" y1="86" x2="202" y2="84"/>
      <line x1="138" y1="86" x2="176" y2="35"/>
      <line x1="132" y1="144" x2="132" y2="209"/>
      <line x1="122" y1="150" x2="179" y2="189"/>
    </g>
    <use href="#vmlimb" transform="translate(240,0) scale(-1,1)"/>
  </g>
  <!-- ===== SOLID BODY ===== -->
  <g fill="#c9a96e" stroke="none">
    <path d="M120,70 L140,84 L130,118 L135,144 L120,151 L105,144 L110,118 L100,84 Z"/>
    <rect x="114" y="58" width="12" height="16" rx="5"/>
    <circle cx="120" cy="48" r="14"/>
    <circle cx="206" cy="84" r="7"/><circle cx="34" cy="84" r="7"/>
    <circle cx="177" cy="33" r="7"/><circle cx="63" cy="33" r="7"/>
    <ellipse cx="132" cy="210" rx="8" ry="5"/><ellipse cx="108" cy="210" rx="8" ry="5"/>
    <ellipse cx="183" cy="191" rx="8" ry="6" transform="rotate(35 183 191)"/>
    <ellipse cx="57" cy="191" rx="8" ry="6" transform="rotate(-35 57 191)"/>
  </g>
  <!-- ===== ETCH TIER 1 — structural + main contour (>~64px) ===== -->
  <g fill="none" stroke="#3d2b1f" stroke-width="2.0" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
    <path d="M120,96 L120,130"/>                  <!-- sternum / linea alba -->
    <path d="M108,97 Q120,105 132,97"/>           <!-- pectoral -->
    <circle cx="120" cy="116" r="2.2"/>            <!-- navel -->
    <g id="etch1R">
      <path d="M120,88 L137,85"/>                  <!-- clavicle -->
      <path d="M148,82 L195,82"/>                  <!-- arm contour -->
      <path d="M146,77 L172,43"/>                  <!-- raised-arm contour -->
      <path d="M140,82 L158,66"/>                  <!-- arm separation -->
      <path d="M129,176 Q132.5,179 136,176"/>     <!-- knee -->
      <path d="M127,153 L145,170"/>                <!-- leg separation -->
    </g>
    <use href="#etch1R" transform="translate(240,0) scale(-1,1)"/>
  </g>
  <!-- ===== ETCH TIER 2 — finer anatomy + hair (>~96px) ===== -->
  <g fill="none" stroke="#3d2b1f" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" opacity="0.5">
    <path d="M111,41 Q114,37 117,40"/><path d="M118,39 Q121,36 124,39"/><path d="M124,41 Q127,38 129,42"/>
    <path d="M120,38 L120,45"/>
    <path d="M114,50 Q120,48.8 126,50"/>
    <path d="M114,112 L126,112"/><path d="M115,122 L125,122"/>
    <g id="etch2R">
      <path d="M111,101 Q116,104 120,104"/>         <!-- rib -->
      <path d="M107,108 Q110,115 113,121"/>         <!-- oblique -->
      <path d="M138,80 Q143,82 146,86"/>            <!-- deltoid -->
      <path d="M170,80 L173,86"/>                   <!-- elbow -->
      <path d="M154,55 L160,60"/>                   <!-- raised elbow -->
    </g>
    <use href="#etch2R" transform="translate(240,0) scale(-1,1)"/>
  </g>
  <!-- ===== ETCH TIER 3 — very fine: fingers, toes, face, hatch (>~150px) ===== -->
  <g fill="none" stroke="#3d2b1f" stroke-width="0.9" stroke-linecap="round" stroke-linejoin="round" opacity="0.4">
    <path d="M116.5,52.3 L118.8,52.3"/><path d="M121.2,52.3 L123.5,52.3"/>
    <path d="M120,52.5 L120,56 M118.6,56 Q120,56.6 121.4,56"/>
    <g id="etch3R">
      <path d="M205,81 L214,79"/><path d="M206,84 L216,84"/><path d="M206,86 L215,89"/><path d="M205,88 L212,92"/>
      <path d="M204,87 L207,93"/>
      <path d="M176,32 L181,26"/><path d="M178,32 L184,29"/><path d="M179,34 L185,34"/><path d="M179,36 L184,40"/>
      <path d="M127,213 L127,209"/><path d="M131,214 L131,209"/><path d="M135,213 L135,209"/>
      <path d="M186,194 L190,197"/><path d="M183,196 L186,199"/>
      <path d="M168,85 L170,89"/><path d="M174,84 L176,88"/>
      <path d="M129,162 L131,168"/>
    </g>
    <use href="#etch3R" transform="translate(240,0) scale(-1,1)"/>
  </g>
</svg>
