# Rotation state for /debt-sweep (.claude/skills/debt-sweep/SKILL.md).
# Pick = oldest last_swept (never sorts first) with remaining > 0.
# detect "build:<CODE>" = distinct sites of that warning code in one fresh build log.
# Seeded 2026-06-12 (counts from origin/main @ e3fdfbcab). Add new themes with
# last_swept: never; add one-offs to inbox. See memory/process/debt-ledger-additions.md.
# Not seeded — zero real [Grandfathered] sites at seed (rules fully enforced):
# HUM0009, HUM0020, HUM0025, HUM0029, HUM0032. The staleness check re-creates
# a theme if any of these is ever grandfathered again.
# Deliberately excluded from staleness/inventory (not fixable debt):
# NoDestructiveMigrationOps.baseline.txt — entries are immutable migration
# history; the baseline guards against NEW destructive ops, it is not a backlog.
version: 1
recent_sections: []
themes:
  - id: grandfathered-hum0024-nav-strip
    title: Cross-section EF navigations in entity configurations (HUM0024)
    detect: "build:HUM0024"
    review: panel
    last_swept: 2026-06-12
    remaining: 34
    notes: >-
      SCHEMA-BLOCKED (verified empirically, sweep 2026-06-12): dropping any
      HasOne config fires `dotnet ef migrations has-pending-model-changes` —
      the config blocks own the DB-level FK + cascade behavior, so every fix
      is an FK-constraint-drop migration, out of sweep scope entirely.
      Rotation skips this theme until Peter decides the path (dedicated
      migration PRs outside the sweep). Reader migration off the navs is the
      cs0618-pragma-nav-reads theme, not this one.
  - id: grandfathered-hum0031-controller-logic
    title: Controller business logic over ratchet thresholds (HUM0031)
    detect: "build:HUM0031"
    review: panel
    last_swept: 2026-06-12
    remaining: 13
    notes: >-
      13 distinct warning sites, all grandfathered (15 grandfathers total —
      AccountController.ExternalLoginCallback and
      EventsController.BulkUploadTemplate no longer fire; their justification
      counts disagree with the analyzer's current counting). Raw grep of a
      full-solution build log double-counts each site (26 lines = 13 sites);
      detect means DISTINCT sites. The rule is "no business
      logic in controllers"; the cc/statement metric is only a proxy
      detector. Exactly two valid fixes: (a) move the domain decisions into
      the section's application service — new/changed interface surface
      needs per-item Peter approval (skip-and-ask); (b) the method is
      genuinely presentation (sorting/filtering/paging/VM mapping) over a
      low threshold — grandfather stays, record it as a
      threshold-calibration finding. FORBIDDEN: splitting the method into
      controller-local private helpers / VM factories to satisfy the metric
      — tried 2026-06-12 on 12 methods, rejected and reverted (dodged the
      metric, moved zero domain decisions). Litmus per statement: would a
      Hangfire job doing the same operation need this line? Yes → service.
      Form-apply model: DietaryMedicalViewModel.ToCommand() →
      profileEditorService.SaveDietaryMedicalAsync(userId, command).
  - id: grandfathered-hum0028-invalidators
    title: Invalidator interface ratchet (HUM0028)
    detect: "build:HUM0028"
    review: panel
    last_swept: never
    remaining: 17
    notes: >-
      17 grandfathered invalidator interfaces
      (memory/architecture/orchestrator-marker.md). Consolidation is design
      work — which invalidators fold into the owning service's cached accessor
      vs. stay. Panel judges each consolidation.
  - id: obsolete-user-displayname
    title: User.DisplayName reads (HUM_USER_DISPLAYNAME)
    detect: "build:HUM_USER_DISPLAYNAME"
    review: light
    last_swept: never
    remaining: 12
    notes: >-
      Migrate to UserInfo.BurnerName / <vc:human> per
      memory/architecture/burnername-is-the-display-name.md. The obsolete
      message names legitimate consumers (creation-time fallback, merge/purge
      labels, GDPR export, debug screens) — those are not debt; leave them.
  - id: cs0618-pragma-nav-reads
    title: Pragma-wrapped CS0618 cross-section nav reads
    detect: "grep -rl --include='*.cs' 'pragma warning disable CS0618' src | wc -l"
    review: panel
    last_swept: never
    remaining: 27
    notes: >-
      Replace pragma-wrapped [Obsolete] nav reads with service stitching — the
      cross-section fix done on both sides at once. Closely coupled to
      grandfathered-hum0024-nav-strip; working one may shrink the other.
      The deferred NavStitching.Suppress consolidation idea lives here too.
  - id: baseline-entity-read-returns
    title: Application services returning entities from reads
    detect: "grep -cv '^#\\|^$' tests/Humans.Application.Tests/Architecture/Baselines/ApplicationServiceEntityReadReturns.baseline.txt"
    review: panel
    last_swept: never
    remaining: 21
    notes: >-
      Convert to DTO/Info returns (read-model pattern, design-rules §15).
      Remove each fixed locator line from the baseline file — never add lines.
  - id: baseline-display-sort
    title: Display sorting below the presentation layer
    detect: "grep -cv '^#\\|^$' tests/Humans.Application.Tests/Architecture/Baselines/DisplaySortInControllers.baseline.txt"
    review: light
    last_swept: never
    remaining: 71
    notes: >-
      Move OrderBy to controllers / view-model assembly per
      memory/architecture/display-sort-in-controllers.md. Pagination
      tie-breakers, top-N, and identity-ordered streams stay, marked
      `// arch:db-sort-ok`. Remove fixed lines from the baseline.
  - id: build-warnings-misc
    title: Build warnings not owned by another theme (CS/NU/non-HUM codes)
    detect: "dotnet build Humans.slnx -v quiet --no-incremental 2>&1 | grep -E ': warning ' | grep -v 'warning HUM' | sed 's/ \\[.*//' | sort -u | wc -l"
    review: light
    last_swept: never
    remaining: 0
    notes: >-
      Catch-all: HUM-coded warnings belong to their own themes; everything
      else (compiler CS, NuGet NU, framework obsoletions) lands here. 0 at
      seed — the build is warning-clean outside the HUM themes. Reuse the
      run's shared build log instead of re-building when possible. New
      custom HUM_* warning ids spotted here should become their own theme.
  - id: inbox
    title: One-off inbox items
    detect: "grep -c '^  - added:' docs/architecture/debt-ledger.yml"
    review: per-item
    last_swept: never
    remaining: 10
    notes: Each inbox entry carries its own review tier; drained entries are deleted from the list.
