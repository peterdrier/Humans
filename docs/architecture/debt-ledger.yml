    title: Cross-section EF navigations in entity configurations (HUM0024)
    detect: "build:HUM0024"
    review: panel
    last_swept: 2026-06-12
    remaining: 34
    notes: >-
      SCHEMA-BLOCKED (verified empirically, sweep 2026-06-12): dropping any
      HasOne config fires `dotnet ef migrations has-pending-model-changes` —
      the config blocks own the DB-level FK + cascade behavior, so every fix
      is an FK-constraint-drop migration, out of sweep scope entirely.
      Rotation skips this theme until Peter decides the path (dedicated
      migration PRs outside the sweep). Reader migration off the navs is the
      cs0618-pragma-nav-reads theme, not this one.
  - id: grandfathered-hum0031-controller-logic
    title: Controller business logic over ratchet thresholds (HUM0031)
    detect: "build:HUM0031"
    review: panel
    last_swept: 2026-06-12
    remaining: 12
    notes: >-
      12 distinct warning sites, all grandfathered (14 grandfathers total —
      AccountController.ExternalLoginCallback and
      EventsController.BulkUploadTemplate no longer fire; their justification
      counts disagree with the analyzer's current counting).
      EventsModerationController.ProcessActionAsync fixed + de-grandfathered
      2026-06-12 (audit E7). Raw grep of a
      full-solution build log double-counts each site (26 lines = 13 sites);
      detect means DISTINCT sites. The rule is "no business
      logic in controllers"; the cc/statement metric is only a proxy
      detector. Exactly two valid fixes: (a) move the domain decisions into
      the section's application service — new/changed interface surface
      needs per-item Peter approval (skip-and-ask); (b) the method is
      genuinely presentation (sorting/filtering/paging/VM mapping) over a
      low threshold — grandfather stays, record it as a
      threshold-calibration finding. FORBIDDEN: splitting the method into
      controller-local private helpers / VM factories to satisfy the metric
      — tried 2026-06-12 on 12 methods, rejected and reverted (dodged the
      metric, moved zero domain decisions). Litmus per statement: would a
      Hangfire job doing the same operation need this line? Yes → service.
      Form-apply model: DietaryMedicalViewModel.ToCommand() →
      profileEditorService.SaveDietaryMedicalAsync(userId, command).
  - id: grandfathered-hum0028-invalidators
    title: Invalidator interface ratchet (HUM0028)
    detect: "build:HUM0028"
    review: panel
    last_swept: 2026-06-13
    remaining: 17
    notes: >-
      DESIGN-BLOCKED (audited empirically, sweep 2026-06-13): folding an
      invalidator into its owning decorator breaks correctness, it is not a
      mechanical sweep fix. Proof on the best fold candidate
      IRoleAssignmentCacheInvalidator (pure self-invalidation): the inner
      RoleAssignmentService calls InvalidateAll() right after the repo write
      but BEFORE SyncBoardTeamAsync reads role data — moving invalidation into
      the decorator's write pass-through (after the whole inner method) makes
      that read see stale cache (read-after-write regression); and
      ReassignAsync deliberately defers invalidation to the cross-section
      caller after a TransactionScope commit, which a decorator-owns fold also
      breaks. Caller-map classification of all 17: 1 self/ordering-sensitive
      (RoleAssignment — stays); 15 cross-section merge/lifecycle or
      intra-section sibling signals that must stay (Consent, ActiveTeams,
      UserInfo, RoleAssignmentClaims, ShiftAuthorization, NavBadge,
      NotificationMeter, VotingBadge, EarlyEntry, ShiftView, LegalDocument [EF
      interceptor], Ticket, CampInfo [CampRoleService sibling], IssuesBadge,
      CampLeadJoinRequestsBadge); 1 speculative future hook with no live caller
      (IEventViewInvalidator — kept for open issue #719; delete-vs-keep is
      Peter's call). None are sweep-mechanical. The HUM0028 ratchet correctly
      blocks NEW invalidators; existing ones are deliberate ordering-sensitive
      seams. Peter 2026-06-13: LEAVE in rotation (re-check periodically, do not
      flag as skip); KEEP IEventViewInvalidator as the #719 placeholder.
  - id: obsolete-user-displayname
    title: User.DisplayName reads (HUM_USER_DISPLAYNAME)
    detect: "build:HUM_USER_DISPLAYNAME"
    review: light
    last_swept: 2026-06-13
    remaining: 20
    notes: >-
      ACTIONABLE = 0 (audited every site, sweep 2026-06-13). All 20 sites that
      fire HUM_USER_DISPLAYNAME are legitimate consumers per the obsolete
      message: creation-time writes (AccountController.CreateExternalLoginUser,
      AccountProvisioningService ×2), BurnerName-fallback derivation
      (UserInfo.cs, CachingUserService.WithUserFields/RehydrateUser),
      write-side sync (UserInfoSaveChangesInterceptor), repository
      merge/purge/delete labels (UserRepository ×6), GDPR export
      (UserService GdprExport shape), GDPR-anonymized sentinel state
      (UserStateClassifier), and debug/dev seeders (DevPersonaSeeder ×2,
      DevelopmentDashboardSeeder, GateTerminalAccountSeeder). Rendering-caller
      debt was already migrated (#691). DETECT OVERCOUNTS: build:HUM_USER_DISPLAYNAME
      counts all 20 firing sites, but legit consumers cannot be silenced
      without a forbidden pragma, so the count floors at ~20 and can never
      reach 0. remaining bumped 12->20 to match the detect; treat it as the
      irreducible legit floor, not a backlog. PARKED — re-check only if a new
      rendering caller of User.DisplayName appears (the analyzer will flag it).
      Peter 2026-06-13: LEAVE parked in the ledger; the [Obsolete] warning
      independently guards against new misuse.
  - id: cs0618-pragma-nav-reads
    title: Pragma-wrapped CS0618 cross-section nav reads
    detect: "grep -rl --include='*.cs' 'pragma warning disable CS0618' src | wc -l"
    review: panel
    last_swept: 2026-06-14
    remaining: 27
    notes: >-
      ACTIONABLE = 0 cross-section nav reads (audited all 27 files, sweep
      2026-06-14). The detect counts FILES-with-pragma and conflates five
      unrelated things, none sweep-mechanical:
      (1) ~15 src/Humans.Infrastructure/Data/Configurations/*.cs HasOne nav
      MAPPINGS = the SCHEMA side, owned by grandfathered-hum0024-nav-strip
      (dropping any fires has-pending-model-changes; out of sweep scope);
      (2) 3 FALSE POSITIVES where the arch scan's textual `.User` heuristic
      matches a non-domain member — HttpCurrentUserContext + CurrentUserEnricher
      (HttpContext.User principal) and AccountController (record field
      result.User);
      (3) 2 obsolete ContactFieldType.Email ENUM reads (legit legacy-data
      display, a different obsolete concern, not nav reads) — ProfileApiController,
      ProfileViewModel;
      (4) the APPROVED §6b in-memory cross-domain stitch (entity nav populated
      from service data, design-rules §6b/§15i) — already migrated: FeedbackService
      (r.User after userService.GetByIdsAsync), TeamService (member.User), and the
      consumers AboutController, ProfileController, TeamController, TeamAdminController,
      TeamViewModels (file-wide);
      (5) 3 IN-SECTION obsolete Team-nav reads in TeamService
      (TeamRoleDefinition.Team, TeamJoinRequest.Team, TeamMember.Team) — off-theme
      (in-section, not cross-section); the only "fix" relocates the pragma into a
      repo projection expression (still CS0618), non-mechanical, panel.
      Like obsolete-user-displayname this detect FLOORS (~27) and can never reach 0
      without forbidden pragmas/schema work. The cross-section reads are ALL already
      service-stitched. PARKED — re-check only when a NEW un-stitched cross-section
      nav read appears (the CS0618 ratchet flags it). Future re-scope: count only
      un-stitched cross-section nav reads (currently 0). TeamViewModels file-wide
      pragma clears only when its VMs are built from service DTOs (large refactor,
      separate). Still closely coupled to grandfathered-hum0024-nav-strip.
  - id: baseline-entity-read-returns
    title: Application services returning entities from reads
    detect: "grep -cv '^#\\|^$' tests/Humans.Application.Tests/Architecture/Baselines/ApplicationServiceEntityReadReturns.baseline.txt"
    review: panel
    last_swept: never
    remaining: 21
    notes: >-
      Convert to DTO/Info returns (read-model pattern, design-rules §15).
      Remove each fixed locator line from the baseline file — never add lines.
      PASSED OVER as #2 rotation candidate (sweep 2026-06-14): all 21 entries are
      public-interface read methods whose fix CHANGES the return type
      entity→DTO — a surface-changing refactor that ripples to every caller
      (e.g. IUserService.GetByIdsAsync:User and ITeamService.GetTeamByIdAsync:Team
      are called pervasively). Per the work-loop's skip-and-ask rule
      (public-surface changes), each item is skip-and-ask, so a sweep can't burn
      these down mechanically — they need Peter's go on doing entity→DTO return
      migrations as sweep work vs. dedicated per-method PRs. last_swept stays
      `never` (not per-item audited; only pattern-classified this run).
  - id: baseline-display-sort
    title: Display sorting below the presentation layer
    detect: "grep -cv '^#\\|^$' tests/Humans.Application.Tests/Architecture/Baselines/DisplaySortInControllers.baseline.txt"
    review: light
    last_swept: 2026-06-13
    remaining: 29
    notes: >-
      Rule: repos don't sort for display. Per Peter (2026-06-13) the fix for a
      flagged repo sort is, in order: (1) if no consumer renders an
      order-sensitive user-facing list -> DELETE it (the sort is wasted work);
      (2) if it IS user-facing (list/dropdown/grid) -> sort in the rendering
      control (view / view-model assembly), NOT the repo. Genuine non-display
      sorts (selectors, top-N/Take, FIFO batches, identity/chronological
      streams, Skip/Take pagination, reorder-neighbor lookups) stay, marked
      `// arch:db-sort-ok`. Remove fixed lines from the baseline.
      Burned 71 -> 29 on 2026-06-13: ~16 false-positive exceptions marked;
      ~15 unused/redundant repo sorts DELETED (UserEmails/ContactFields/
      Languages, GDPR-export paths, camp-image Includes that the service+view
      already re-sort, AccountMerge); view-moves done for campaign admin list +
      user/admin grant tables (client-sortable TableModel default set in the
      view) and team role-definition lists + account-merge review queue
      (@foreach / controller VM assembly).
      REVERTED after Codex review (PR #1002): GoogleResourceRepository
      GetActiveByTeamId(s) and CampRepository.Roles.ListDefinitions deletions
      were premature — those reads have order-dependent rendering consumers that
      do NOT re-sort (CampRoleService.BuildPanelAsync renders defs in repo order
      for the roles panel/members/lead-pills; TeamResourceService maps straight
      to UI/API snapshots). Repo sorts restored + re-baselined; they join the
      deferred multi-consumer view-moves below.
      REMAINING 29 = 18 Ticket sortBy/sortDesc real-debt (Peter ruled: stays,
      needs the paged-grid sort redesigned — server-side pagination forces it
      to the DB; NOT a db-sort-ok mark) + 11 harder multi-consumer view-moves
      deferred: GoogleResource GetActiveByTeamId(s) (2), CampRoles.ListDefinitions
      (2), CampaignRepository.GetCodeTrackingSummaries (tracking view not yet
      located), CampRepository.GetCampsWithLeadsForYear season-name sort
      (multi-consumer camps list), CampRepository.Roles.GetAssignmentsForSeason
      (2), and TeamRepository.GetAllRoleDefinitions roster sort (3 — the roster
      slot DTO TeamRosterSlotSummary lacks SortOrder, so the view can't re-sort
      without a DTO field added). These need their views located / a DTO field
      and are a focused follow-up.
  - id: build-warnings-misc
    title: Build warnings not owned by another theme (CS/NU/non-HUM codes)
    detect: "dotnet build Humans.slnx -v quiet --no-incremental 2>&1 | grep -E ': warning ' | grep -v 'warning HUM' | sed 's/ \\[.*//' | sort -u | wc -l"
    review: light
    last_swept: never
    remaining: 0
    notes: >-
      Catch-all: HUM-coded warnings belong to their own themes; everything
      else (compiler CS, NuGet NU, framework obsoletions) lands here. 0 at
      seed — the build is warning-clean outside the HUM themes. Reuse the
      run's shared build log instead of re-building when possible. New
      custom HUM_* warning ids spotted here should become their own theme.
