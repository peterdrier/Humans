# Rotation state for /debt-sweep (.claude/skills/debt-sweep/SKILL.md).
# Pick = oldest last_swept (never sorts first) with remaining > 0.
# detect "build:<CODE>" = distinct sites of that warning code in one fresh build log.
# Seeded 2026-06-12 (counts from origin/main @ e3fdfbcab). Add new themes with
# last_swept: never; add one-offs to inbox. See memory/process/debt-ledger-additions.md.
# Not seeded — zero real [Grandfathered] sites at seed (rules fully enforced):
# HUM0009, HUM0020, HUM0025, HUM0029, HUM0032. The staleness check re-creates
# a theme if any of these is ever grandfathered again.
# Deliberately excluded from staleness/inventory (not fixable debt):
# NoDestructiveMigrationOps.baseline.txt — entries are immutable migration
# history; the baseline guards against NEW destructive ops, it is not a backlog.
version: 1
recent_sections: [Campaigns, Feedback, Governance]
