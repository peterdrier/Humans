name: PR Surface Report

# Build/analysis half of the surface report. Runs on `pull_request` (NOT
# pull_request_target) so that for fork PRs it carries only a read-only token
# and no secrets. This job restores+builds PR-head code (`dotnet build`) and
# scores it with reforge; both execute fork-authored MSBuild targets — that is
# acceptable ONLY because this
# job has nothing privileged to steal and no privileged follow-up step to
# poison (no commenting here). The privileged comment is posted by the separate
# pr-surface-report-comment.yml workflow, triggered via workflow_run, which
# never runs PR code.
on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read

concurrency:
  group: pr-surface-report-${{ github.repository }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  report:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch PR head
        run: |
          set -euo pipefail
          git fetch --no-tags origin "pull/${{ github.event.pull_request.number }}/head:pr-surface-head"

          # Score against the MERGE-BASE, not the base-branch tip.
          # github.event.pull_request.base.sha is the CURRENT tip of the base
          # branch. If the PR branch is behind main, diffing/scoring against that
          # tip folds every commit that landed on main since the branch was cut
          # into this PR's "delta" — inverted. A Teams PR merging to main then
          # shows up as THIS (Camps) PR "removing" 364 of Teams surface, and a
          # method whose signature changed on main reads as "added" here. The
          # merge-base is where the branch diverged, so head-vs-merge-base is
          # exactly what this PR's own commits changed — and it matches the
          # three-dot (`base...head`) diff the report's Diff Size section already
          # uses, making the whole report internally consistent.
          MERGE_BASE="$(git merge-base "${{ github.event.pull_request.base.sha }}" pr-surface-head)"
          echo "SURFACE_BASE_SHA=$MERGE_BASE" >> "$GITHUB_ENV"

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'

      - name: Generate Reforge score delta inputs
        run: |
          set -euo pipefail
          dotnet tool install --global reforge
          REFORGE="$HOME/.dotnet/tools/reforge"

          # Record the resolved version so the report can name which reforge
          # scored it — rules/weightings change between releases, so the version
          # is what makes one run's score comparable to another's.
          REFORGE_VERSION="$(dotnet tool list --global | awk 'tolower($1)=="reforge"{print $2}')"
          echo "REFORGE_VERSION=$REFORGE_VERSION" >> "$GITHUB_ENV"

          BASE_DIR="$(mktemp -d)"
          HEAD_DIR="$(mktemp -d)"
          rmdir "$BASE_DIR" "$HEAD_DIR"
          git worktree add --detach "$BASE_DIR" "$SURFACE_BASE_SHA"
          git worktree add --detach "$HEAD_DIR" pr-surface-head

          CONFIG_ARGS=()
          if [ -f "$HEAD_DIR/reforge.surface-score.json" ]; then
            CONFIG_ARGS=(--config "$HEAD_DIR/reforge.surface-score.json")
          elif [ -f "$BASE_DIR/reforge.surface-score.json" ]; then
            CONFIG_ARGS=(--config "$BASE_DIR/reforge.surface-score.json")
          elif [ -f "$GITHUB_WORKSPACE/reforge.surface-score.json" ]; then
            CONFIG_ARGS=(--config "$GITHUB_WORKSPACE/reforge.surface-score.json")
          fi

          "$REFORGE" stop || true
          (
            cd "$BASE_DIR"
            # Restore+build before scoring: reforge opens the solution via
            # MSBuildWorkspace, which needs each project's obj/project.assets.json
            # to resolve package/project references. An unbuilt worktree yields
            # tens of thousands of unresolved-reference errors and a PARTIAL
            # surface-score (cross-section/DI/entity rules under-count). reforge
            # is a query tool, not a build tool, so the caller must build.
            dotnet build Humans.slnx --disable-build-servers -v quiet
            "$REFORGE" surface-score --solution Humans.slnx "${CONFIG_ARGS[@]}" --format Json --top 200 > "$GITHUB_WORKSPACE/reforge-base.json"
          )
          "$REFORGE" stop || true
          (
            cd "$HEAD_DIR"
            dotnet build Humans.slnx --disable-build-servers -v quiet
            "$REFORGE" surface-score --solution Humans.slnx "${CONFIG_ARGS[@]}" --format Json --top 200 > "$GITHUB_WORKSPACE/reforge-head.json"
          )
          "$REFORGE" stop || true

      - name: Generate surface report
        run: |
          REFORGE_ARGS=()
          if [ -f reforge-base.json ] && [ -f reforge-head.json ]; then
            REFORGE_ARGS=(--reforge-base-json reforge-base.json --reforge-head-json reforge-head.json)
          fi
          if [ -n "${REFORGE_VERSION:-}" ]; then
            REFORGE_ARGS+=(--reforge-version "$REFORGE_VERSION")
          fi

          python3 scripts/pr-surface-report.py \
            --base "$SURFACE_BASE_SHA" \
            --head "pr-surface-head" \
            --base-label "$SURFACE_BASE_SHA" \
            --head-label "${{ github.event.pull_request.head.sha }}" \
            "${REFORGE_ARGS[@]}" \
            --output pr-surface-report.md \
            --json-output pr-surface-report.json

      - name: Upload report artifact
        uses: actions/upload-artifact@v7
        with:
          name: pr-surface-report
          path: pr-surface-report.md
          if-no-files-found: error

      - name: Enforce migration count
        if: always()
        run: |
          count="$(jq -r '.migration_count' pr-surface-report.json)"
          if [ "$count" -gt 1 ]; then
            echo "::error::PR changes $count real EF migration files. Keep at most 1 migration per PR."
            exit 1
          fi
