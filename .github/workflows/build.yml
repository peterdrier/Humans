name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore Humans.slnx

    - name: Build
      run: dotnet build Humans.slnx --no-restore --configuration Release

    - name: Test
      # --blame-hang-timeout 2m is the CI hang guard: if the test host stalls
      # for 2+ minutes we dump and fail the run rather than burning the whole
      # job budget on a silent hang. See nobodies-collective/Humans#586 — PR
      # peterdrier/Humans#306 shipped a DI cycle that silently stalled the
      # test host for 8+ minutes before this guard existed.
      run: dotnet test Humans.slnx --no-build --configuration Release --verbosity quiet --blame-hang-timeout 2m --logger "trx;LogFileName=test-results.trx" --logger "console;verbosity=minimal" --filter "FullyQualifiedName!~Integration"

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: '**/test-results.trx'
        retention-days: 5

  code-quality:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore Humans.slnx

    - name: Check formatting
      run: dotnet format Humans.slnx --verify-no-changes --verbosity diagnostic --exclude src/Humans.Infrastructure/Migrations/

    - name: Enforce google_resources ownership
      run: bash scripts/check-google-resource-ownership.sh
